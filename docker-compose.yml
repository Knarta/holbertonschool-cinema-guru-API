services:
  node:
    restart: always
    build: .
    environment:
      DB_SCHEMA: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      JWT_TOKEN_SECRET: dev_jwt_secret_change_me
      TOKEN_EXPIRE_SECONDS: 3600
    ports:
      - 8000:8000
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - node-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
 node-db:
